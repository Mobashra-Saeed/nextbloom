<section class="not-found-page">
    <div class="not-found-glow not-found-glow-left"></div>
    <div class="not-found-glow not-found-glow-right"></div>

    <div class="not-found-card animate-fade-in-up">
        <div class="not-found-hero">
            <span class="sparkle sparkle-top">✨</span>
            <span class="sparkle sparkle-bottom">✨</span>
            <span class="sparkle blossom">🌸</span>
            <h1 class="not-found-code">404</h1>
        </div>

        <div class="not-found-copy">
            <h2>Lost in the Fairy Dust?</h2>
            <p>
                It seems the portal misdirected you! This path hasn't been strung with beads yet, or the page vanished
                into thin air.
            </p>
        </div>

        <div class="not-found-actions">
            <a (click)="goHome()" class="btn-primary-not-found">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="btn-icon">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
                Return to Shop
            </a>

            <button (click)="openFairyChat()" class="btn-secondary-not-found">
                <span>✨</span>
                Ask Fairy Guide
            </button>
        </div>
    </div>
</section>
