<div class="w-full bg-[var(--bg-light)] select-none flex flex-col">

    <!-- ================= 1. PREMIUM BOUTIQUE HEADER (NOW STICKY) ================= -->
    <header
        class="fixed top-0 left-0 right-0 w-full bg-[var(--bg-light)] text-[var(--text-taupe)] flex flex-col z-50 border-b border-[var(--line-soft)]/40 shadow-[0_4px_15px_-3px_rgba(0,0,0,0.12)]">
        <div class="w-full max-w-7xl mx-auto px-6 md:px-10 h-20 flex items-center justify-between">
            <div class="flex items-center gap-1" routerLink="/products">
                <img src="./assets/images/logo.jpeg" alt="Nextbloom"
                    class="w-16 h-16 md:w-14 md:h-14 object-contain mix-blend-multiply cursor-pointer">
                <h1
                    class="font-serif text-xl md:text-2xl tracking-[0.15em] uppercase font-light text-[var(--text-taupe)] mt-1 cursor-pointer">
                    Next<span class="text-[var(--brand-pink-dark)] font-medium pl-1 italic">bloom</span>
                </h1>
            </div>
            <!-- Right: Contact & User Actions grouped together -->
            <div class="flex items-center gap-4 md:gap-4 text-[var(--text-taupe)]/80">
                <!-- Phone Icon -->
                <a href="https://wa.me/923486527505" target="_blank" rel="noopener noreferrer"
                    class="flex items-center justify-center p-1 transition-colors duration-300 hover:text-[var(--brand-pink-dark)] cursor-pointer group"
                    title="Message Us">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                        class="w-6 h-6 transition-all duration-300 group-hover:fill-[var(--brand-pink-dark)]/10">
                        <!-- New Chat/Message Bubble Icon -->
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 01.778-.332 48.294 48.294 0 005.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z" />
                    </svg>
                </a>
                <!-- WishList (Heart) -->
                <button
                    class="flex items-center justify-center p-1 transition-colors duration-300 hover:text-[var(--brand-pink-dark)] cursor-pointer hidden sm:flex relative group"
                    title="WishList" [routerLink]="['/wishlist']">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                        class="w-6 h-6 transition-all duration-300 group-hover:fill-[var(--brand-pink-dark)]/10">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                    </svg>
                    <span
                        class="absolute -top-1 -right-1.5 bg-[var(--brand-pink)] text-[var(--surface-white)] font-bold text-[9px] min-w-4 h-4 px-1 rounded-full flex items-center justify-center shadow-sm">
                        {{ store.wishlistItemsCount() }}
                    </span>
                </button>
                <!-- Cart -->
                <button
                    class="flex items-center justify-center p-1 transition-colors duration-300 hover:text-[var(--brand-pink-dark)] cursor-pointer relative group"
                    title="Cart" [routerLink]="['/cart']">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                        class="w-6 h-6 transition-all duration-300 group-hover:fill-[var(--brand-pink-dark)]/10">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                    </svg>
                    <span
                        class="absolute -top-1 -right-1.5 bg-[var(--brand-pink)] text-[var(--surface-white)] font-bold text-[9px] min-w-4 h-4 px-1 rounded-full flex items-center justify-center shadow-sm">
                        {{ store.cartItemsCount() }}
                    </span>
                </button>
            </div>
        </div>
    </header>
</div>
